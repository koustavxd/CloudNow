<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNow - Sign Up & Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ec4899;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 1rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .auth-wrapper {
            margin-top: 100px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .auth-card.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }

        .toggle-auth a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-auth a:hover {
            color: var(--accent);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .remember-forgot input[type="checkbox"] {
            width: auto;
            margin-right: 0.5rem;
        }

        .remember-forgot a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: var(--accent);
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--text-secondary);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.85rem;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .social-btn:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }

        @media (max-width: 480px) {
            .auth-wrapper {
                margin-top: 80px;
            }

            .auth-card {
                padding: 2rem 1.5rem;
            }

            .auth-card h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="home.html" class="logo">
                <span class="logo-icon">☁️</span>
                <h1>CloudNow</h1>
            </a>
            <a href="#" class="nav-link" onclick="toggleAuth()">Toggle Mode</a>
        </div>
    </nav>

    <!-- Auth Wrapper -->
    <div class="auth-wrapper">
        <div class="container">
            <!-- Login Card -->
            <div class="auth-card active" id="loginCard">
                <h2>Welcome Back</h2>
                <p>Sign in to your CloudNow account</p>

                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            name="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="password" 
                            placeholder="Enter your password" 
                            required
                        >
                    </div>

                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" onclick="alert('Forgot password feature coming soon!')">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="social-buttons">
                    <button class="social-btn" onclick="handleSocialLogin('Google')">
                        🔍 Google
                    </button>
                    <button class="social-btn" onclick="handleSocialLogin('GitHub')">
                        🐙 GitHub
                    </button>
                    <button class="social-btn" onclick="handleSocialLogin('Microsoft')">
                        ⊞ Microsoft
                    </button>
                </div>

                <div class="toggle-auth">
                    Don't have an account? <a onclick="toggleAuth()">Sign Up</a>
                </div>
            </div>

            <!-- Sign Up Card -->
            <div class="auth-card" id="signupCard">
                <h2>Create Account</h2>
                <p>Join CloudNow and start your journey</p>

                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input 
                            type="text" 
                            id="signupName" 
                            name="fullname" 
                            placeholder="John Doe" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            name="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input 
                            type="password" 
                            id="signupPassword" 
                            name="password" 
                            placeholder="Create a strong password" 
                            required
                            minlength="8"
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupConfirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="signupConfirmPassword" 
                            name="confirmpassword" 
                            placeholder="Confirm your password" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="terms" required> 
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="social-buttons">
                    <button class="social-btn" onclick="handleSocialSignup('Google')">
                        🔍 Google
                    </button>
                    <button class="social-btn" onclick="handleSocialSignup('GitHub')">
                        🐙 GitHub
                    </button>
                    <button class="social-btn" onclick="handleSocialSignup('Microsoft')">
                        ⊞ Microsoft
                    </button>
                </div>

                <div class="toggle-auth">
                    Already have an account? <a onclick="toggleAuth()">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.loggedIn) {
                window.location.href = 'home.html';
            }
        });

        // Toggle between login and signup
        function toggleAuth() {
            const loginCard = document.getElementById('loginCard');
            const signupCard = document.getElementById('signupCard');
            
            loginCard.classList.toggle('active');
            signupCard.classList.toggle('active');

            // Clear forms and messages
            document.getElementById('loginForm').reset();
            document.getElementById('signupForm').reset();
            clearMessages();
        }

        // Clear all messages
        function clearMessages() {
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('loginSuccess').textContent = '';
            document.getElementById('loginSuccess').classList.remove('show');
            document.getElementById('signupError').textContent = '';
            document.getElementById('signupError').classList.remove('show');
            document.getElementById('signupSuccess').textContent = '';
            document.getElementById('signupSuccess').classList.remove('show');
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            clearMessages();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.querySelector('input[name="remember"]').checked;

            // Validation
            if (!email || !password) {
                showError('loginError', 'Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('loginError', 'Password must be at least 6 characters');
                return;
            }

            // Store user data in localStorage
            localStorage.setItem('user', JSON.stringify({ 
                email, 
                name: email.split('@')[0], 
                loggedIn: true 
            }));
            
            if (remember) {
                localStorage.setItem('rememberMe', 'true');
            }

            // Simulate API call
            console.log('Login attempt:', { email, password, remember });
            showSuccess('loginSuccess', '✓ Login successful! Redirecting to home...');

            // Redirect to home page after 2 seconds
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 2000);
        }

        // Handle signup
        function handleSignup(event) {
            event.preventDefault();
            clearMessages();

            const fullname = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const terms = document.querySelector('input[name="terms"]').checked;

            // Validation
            if (!fullname || !email || !password || !confirmPassword) {
                showError('signupError', 'Please fill in all fields');
                return;
            }

            if (password.length < 8) {
                showError('signupError', 'Password must be at least 8 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('signupError', 'Passwords do not match');
                return;
            }

            if (!terms) {
                showError('signupError', 'You must agree to the terms and conditions');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('signupError', 'Please enter a valid email address');
                return;
            }

            // Store user data in localStorage
            localStorage.setItem('user', JSON.stringify({ 
                email, 
                name: fullname, 
                loggedIn: true 
            }));

            // Simulate API call
            console.log('Signup attempt:', { fullname, email, password });
            showSuccess('signupSuccess', '✓ Account created successfully! Redirecting to home...');

            // Redirect to home page after 2 seconds
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 2000);
        }

        // Social login
        function handleSocialLogin(provider) {
            clearMessages();
            console.log(`Login with ${provider}`);
            showSuccess('loginSuccess', `Connecting with ${provider}...`);
            setTimeout(() => {
                alert(`${provider} login feature coming soon!`);
            }, 1500);
        }

        // Social signup
        function handleSocialSignup(provider) {
            clearMessages();
            console.log(`Signup with ${provider}`);
            showSuccess('signupSuccess', `Connecting with ${provider}...`);
            setTimeout(() => {
                alert(`${provider} signup feature coming soon!`);
            }, 1500);
        }

        // Show error message
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }

        // Show success message
        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && e.shiftKey) {
                e.preventDefault();
                toggleAuth();
            }
        });
    </script>
</body>
</html>
